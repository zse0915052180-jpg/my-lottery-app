<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飛艇即時看板 & 計算機</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #0d1622;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 10px 6px;
        }

        /* 針對小螢幕手機優化容器大小 */
        .board-container {
            width: 100%;
            max-width: 480px; /* 適合手機的滿版寬度 */
            background-color: #152232;
            border-radius: 12px;
            padding: 12px 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #1e3046;
        }

        /* 頂部標題區 */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #64b5f6;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-group {
            display: flex;
            gap: 6px;
        }

        .tab-btn {
            background-color: #1e3046;
            color: #94a3b8;
            border: 1px solid #2c4460;
            padding: 5px 10px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #2196f3;
            color: #ffffff;
            border-color: #64b5f6;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.4);
        }

        /* 倒數與期號資訊欄 */
        .info-card {
            background-color: #0f1926;
            border: 1px solid #1e3046;
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .next-issue {
            color: #cbd5e1;
            font-weight: bold;
        }

        .next-issue span {
            color: #ffffff;
        }

        .countdown {
            color: #ffb74d;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .timer {
            background-color: #1e293b;
            color: #ffb74d;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* 欄位表頭 */
        .table-header {
            display: grid;
            grid-template-columns: 52px repeat(10, 1fr);
            gap: 3px;
            text-align: center;
            color: #64748b;
            font-size: 11px;
            font-weight: bold;
            padding-bottom: 6px;
            margin-bottom: 6px;
            border-bottom: 1px solid #1e3046;
        }

        .rank-tag {
            background-color: #1b2a3c;
            color: #94a3b8;
            border-radius: 3px;
            padding: 2px 0;
        }

        /* 歷史號碼列表：固定顯示約 7-8 期高度，可手勢/滑鼠滾動 */
        .data-list-scroll {
            max-height: 330px; /* 固定約 7-8 期的高度 */
            overflow-y: auto;  /* 允許上下滑動查看歷史 */
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 2px;
        }

        /* 自訂滾動條樣式 */
        .data-list-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .data-list-scroll::-webkit-scrollbar-thumb {
            background: #2b3e50;
            border-radius: 4px;
        }

        .data-row {
            display: grid;
            grid-template-columns: 52px repeat(10, 1fr);
            gap: 3px;
            align-items: center;
            background-color: #111c2a;
            padding: 5px 3px;
            border-radius: 6px;
            border: 1px solid #1a293b;
        }

        .period-no {
            font-size: 10px;
            font-weight: bold;
            color: #94a3b8;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* 藍底號碼方塊 (適應手機比例) */
        .num-box {
            background-color: #1e88e5;
            color: #ffffff;
            font-weight: bold;
            font-size: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-shadow: inset 0 -1.5px 0 rgba(0, 0, 0, 0.2);
        }

        /* ------------------------------------------- */
        /* 🧮 下方預留區：公式計算機 (目前為空白區塊) */
        /* ------------------------------------------- */
        .calculator-section {
            margin-top: 14px;
            background-color: #0d1724;
            border: 1.5px dashed #2a3f5a; /* 虛線框標示空白計算機區域 */
            border-radius: 10px;
            padding: 16px 12px;
            min-height: 180px; /* 預留高度 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        .calc-title {
            font-size: 14px;
            font-weight: bold;
            color: #4da6ff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .calc-placeholder-text {
            font-size: 12px;
            color: #475569;
            text-align: center;
        }

        .status-msg {
            text-align: center;
            padding: 15px;
            color: #94a3b8;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="board-container">
        <!-- 頂部標題與彩種切換 -->
        <div class="header-bar">
            <div class="title">
                <span>🎰</span> <span id="titleText">極速飛艇</span>
            </div>
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchLottery('67', '極速飛艇', this)">🚀 極速</button>
                <button class="tab-btn" onclick="switchLottery('10035', '幸運飛艇', this)">⛵ 幸運</button>
            </div>
        </div>

        <!-- 下期期號與開獎倒數 -->
        <div class="info-card">
            <div class="next-issue">下期：<span id="nextPeriod">------</span></div>
            <div class="countdown">
                <span>⌛ 距封盤：</span>
                <span class="timer" id="countdownTimer">00 : 00</span>
            </div>
        </div>

        <!-- 欄位標題 (冠 ~ 十) -->
        <div class="table-header">
            <div>期號</div>
            <div class="rank-tag">冠</div>
            <div class="rank-tag">亞</div>
            <div class="rank-tag">三</div>
            <div class="rank-tag">四</div>
            <div class="rank-tag">五</div>
            <div class="rank-tag">六</div>
            <div class="rank-tag">七</div>
            <div class="rank-tag">八</div>
            <div class="rank-tag">九</div>
            <div class="rank-tag">十</div>
        </div>

        <!-- 歷史數據列表 (只留約 7-8 期高度，可上下滾動滑動) -->
        <div id="dataContainer" class="data-list-scroll">
            <div class="status-msg">正在載入開獎數據...</div>
        </div>

        <!-- 🧮 下方：公式計算機 (空白預留區) -->
        <div class="calculator-section" id="calculatorArea">
            <div class="calc-title">
                <span>🧮</span> 公式計算機
            </div>
            <div class="calc-placeholder-text">
                （預留空白區域，隨時準備加入計算邏輯）
            </div>
        </div>
    </div>

    <script>
        let currentLotCode = '67';

        function switchLottery(lotCode, name, btn) {
            currentLotCode = lotCode;
            document.getElementById('titleText').innerText = name;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            fetchData();
        }

        async function fetchData() {
            const container = document.getElementById('dataContainer');

            try {
                const res = await fetch(`/api/get-lottery?lotCode=${currentLotCode}`);
                const data = await res.json();

                if (data && data.result && data.result.data.length > 0) {
                    const list = data.result.data;
                    
                    const latestPeriod = list[0].period;
                    if (latestPeriod) {
                        document.getElementById('nextPeriod').innerText = (parseInt(latestPeriod) + 1).toString();
                    }

                    container.innerHTML = "";
                    list.forEach(item => {
                        const nums = item.number.split(/[, ]+/);

                        let numsHtml = "";
                        nums.forEach(n => {
                            if (n.trim()) {
                                const formattedNum = n.trim().padStart(2, '0');
                                numsHtml += `<div class="num-box">${formattedNum}</div>`;
                            }
                        });

                        container.innerHTML += `
                            <div class="data-row">
                                <div class="period-no">${item.period.slice(-5)}</div>
                                ${numsHtml}
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<div class="status-msg">⚠️ 暫無開獎資料</div>`;
                }
            } catch (err) {
                container.innerHTML = `<div class="status-msg">❌ 連線失敗</div>`;
            }
        }

        let secondsLeft = 45;
        function updateTimer() {
            if (secondsLeft <= 0) {
                secondsLeft = 75;
                fetchData();
            }
            const mins = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
            const secs = String(secondsLeft % 60).padStart(2, '0');
            document.getElementById('countdownTimer').innerText = `${mins} : ${secs}`;
            secondsLeft--;
        }

        fetchData();
        setInterval(updateTimer, 1000);
        setInterval(fetchData, 10000);
    </script>

</body>
</html>
