<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歷史頭尾數據動態對比看板 (完整功能版)</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #0b141e;
            color: #ffffff;
            padding: 30px 10px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #121e2b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        h2 { text-align: center; color: #4da6ff; margin-bottom: 10px; }
        
        .info-bar {
            text-align: center;
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 15px;
            background: #1a2838;
            padding: 10px;
            border-radius: 6px;
            line-height: 1.6;
        }

        .lottery-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .lottery-row {
            background-color: #1a2838;
            border-radius: 8px;
        }
        .period-cell {
            padding: 12px 15px;
            font-size: 16px;
            font-weight: bold;
            color: #a0aec0;
            text-align: center;
            width: 100px;
        }
        .numbers-cell {
            padding: 10px;
            display: flex;
            gap: 8px;
        }

        /* 號碼方塊基本樣式 (圓角與立體感) */
        .num-box {
            width: 42px;
            height: 48px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 頭五號：綠色 */
        .num-box.green {
            background: linear-gradient(180deg, #38a169 0%, #2f855a 100%);
            border: 1px solid #68d391;
        }

        /* 後五號：紅色 */
        .num-box.red {
            background: linear-gradient(180deg, #e53e3e 0%, #c53030 100%);
            border: 1px solid #fc8181;
        }

        /* 無足夠歷史紀錄時備用：藍色 */
        .num-box.blue {
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border: 1px solid #4299e1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎰 歷史順序動態對比看板</h2>
        <div class="info-bar">
            💡 <b>計算規則：</b> 每期開獎皆採計「該期前 30 期歷史」動態推算 1~10 名的頭尾歸屬<br>
            🟢 <b>頭五號</b> (綠色) | 🔴 <b>後五號</b> (紅色) | 固定顯示最新 30 期
        </div>
        
        <div id="status" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></div>

        <table class="lottery-table">
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // 核心邏輯：計算特定位置 (posIndex) 在該期之前的歷史頭五號與後五號
        function getHeadTailForPosition(pastRecords, posIndex) {
            let seenNumbers = [];
            
            // 從過去歷史逐筆記錄該位置出現的號碼先後順序
            for (let item of pastRecords) {
                const nums = item.number.replace(/\s+/g, '').split(',');
                if (nums[posIndex] !== undefined) {
                    const val = parseInt(nums[posIndex], 10);
                    if (!seenNumbers.includes(val)) {
                        seenNumbers.push(val);
                    }
                }
                // 當 10 個號碼都出現過即停止
                if (seenNumbers.length === 10) break;
            }

            const headSet = new Set(seenNumbers.slice(0, 5));
            const tailSet = new Set(seenNumbers.slice(5, 10));

            return { headSet, tailSet };
        }

        async function fetchData() {
            const statusDiv = document.getElementById('status');
            const tableBody = document.getElementById('tableBody');
            
            // 已修改為相對路徑：雲端及本機皆可自動適應 API 請求
            const apiUrl = "/api/get-lottery";

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.result && data.result.data) {
                    const fullData = data.result.data; // 全量數據陣列
                    
                    // 1. 畫面限制僅呈現最新 30 期
                    const displayData = fullData.slice(0, 30);

                    statusDiv.innerHTML = '<span style="color: #68d391;">✅ 即時同步中 (自動進行滾動式近 30 期頭尾比對)</span>';
                    tableBody.innerHTML = "";

                    // 2. 逐期渲染畫面
                    displayData.forEach((item, index) => {
                        // 💡 關鍵：只截取「該期之後」的陣列（即該期開出前的歷史紀錄）
                        const pastRecords = fullData.slice(index + 1);

                        const nums = item.number.replace(/\s+/g, '').split(',');

                        // 3. 處理第 1 至第 10 名的顏色與格式
                        const numBoxesHtml = nums.map((n, posIndex) => {
                            const val = parseInt(n, 10);
                            let colorClass = 'blue';

                            if (pastRecords.length > 0) {
                                // 獨立計算此位置在歷史中的頭五號與後五號
                                const { headSet, tailSet } = getHeadTailForPosition(pastRecords, posIndex);

                                if (headSet.has(val)) {
                                    colorClass = 'green';
                                } else if (tailSet.has(val)) {
                                    colorClass = 'red';
                                }
                            }

                            // 統一呈現雙位數格式 (如: 01, 02)
                            const displayNum = val < 10 ? `0${val}` : `${val}`;

                            return `<div class="num-box ${colorClass}">${displayNum}</div>`;
                        }).join('');

                        const row = `
                            <tr class="lottery-row">
                                <td class="period-cell">${item.period}</td>
                                <td>
                                    <div class="numbers-cell">
                                        ${numBoxesHtml}
                                    </div>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '<span style="color: #fc8181;">⚠️ 請確認 Python 後端 (server.py) 是否啟動中！</span>';
            }
        }

        // 開頁面即時載入一次
        fetchData();

        // 設定每 5 秒自動刷新（即時輪詢）
        setInterval(fetchData, 5000);
    </script>

</body>
</html>
