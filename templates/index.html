<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛艇即時數據看板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: #0b131e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 15px 8px;
        }

        .board-container {
            width: 100%;
            max-width: 500px;
            background-color: #121e2b;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e2d3d;
        }

        /* 頂部 Header */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #4da6ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-group {
            display: flex;
            gap: 6px;
        }

        .tab-btn {
            background-color: #1a2836;
            color: #8a9ba8;
            border: 1px solid #2a3b4c;
            padding: 5px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .tab-btn.active {
            background-color: #2196f3;
            color: #ffffff;
            border-color: #64b5f6;
        }

        /* 說明列 (頭五 / 後五) */
        .sub-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #8a9ba8;
            margin-bottom: 10px;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .dot-green { background-color: #2e7d32; }
        .dot-red { background-color: #c62828; }

        /* 資訊列 */
        .info-card {
            background-color: #0d1722;
            border: 1px solid #1e2d3d;
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .next-issue { font-weight: bold; color: #cbd5e1; }
        .countdown { color: #ffb74d; font-weight: bold; }
        .timer {
            background-color: #1e293b;
            color: #ffb74d;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 表頭 (冠~十) */
        .table-header {
            display: grid;
            grid-template-columns: 55px repeat(10, 1fr);
            gap: 3px;
            text-align: center;
            color: #64748b;
            font-size: 11px;
            font-weight: bold;
            padding-bottom: 6px;
            margin-bottom: 6px;
        }

        .rank-tag {
            background-color: #1a2836;
            color: #8a9ba8;
            border-radius: 3px;
            padding: 2px 0;
        }

        /* 歷史列表 */
        .data-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .data-row {
            display: grid;
            grid-template-columns: 55px repeat(10, 1fr);
            gap: 3px;
            align-items: center;
            background-color: #0d1722;
            padding: 6px 3px;
            border-radius: 6px;
            border: 1px solid #1a2836;
        }

        .period-no {
            font-size: 11px;
            font-weight: bold;
            color: #8a9ba8;
            text-align: center;
        }

        /* 號碼球 (紅/綠/藍) */
        .num-box {
            color: #ffffff;
            font-weight: bold;
            font-size: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        /* 紅底與綠底樣式 (舊版特有) */
        .bg-green { background-color: #2e7d32; }
        .bg-red { background-color: #c62828; }
        .bg-blue { background-color: #1e88e5; }

        .status-msg {
            text-align: center;
            padding: 20px;
            color: #ffb74d;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="board-container">
        <!-- 頂部切換 -->
        <div class="header-bar">
            <div class="title">
                <span>🎰</span> <span id="titleText">極速飛艇</span>
            </div>
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchLottery('67', '極速飛艇', this)">🚀 極速飛艇</button>
                <button class="tab-btn" onclick="switchLottery('10035', '幸運飛艇', this)">⛵ 幸運飛艇</button>
            </div>
        </div>

        <!-- 頭五 / 後五 標示 -->
        <div class="sub-header">
            <span><span class="dot dot-green"></span>頭五</span>
            <span>|</span>
            <span><span class="dot dot-red"></span>後五</span>
            <span>| 點擊「冠~十」查順反</span>
        </div>

        <!-- 下期與倒數 -->
        <div class="info-card">
            <div class="next-issue">下期：<span id="nextPeriod">------</span></div>
            <div class="countdown">
                <span>⌛ 距封盤：</span>
                <span class="timer" id="countdownTimer">00 : 00</span>
            </div>
        </div>

        <!-- 表頭 -->
        <div class="table-header">
            <div>期號</div>
            <div class="rank-tag">冠</div>
            <div class="rank-tag">亞</div>
            <div class="rank-tag">三</div>
            <div class="rank-tag">四</div>
            <div class="rank-tag">五</div>
            <div class="rank-tag">六</div>
            <div class="rank-tag">七</div>
            <div class="rank-tag">八</div>
            <div class="rank-tag">九</div>
            <div class="rank-tag">十</div>
        </div>

        <!-- 開獎數據容器 -->
        <div id="dataContainer" class="data-list">
            <div class="status-msg">⏳ 正在同步數據...</div>
        </div>
    </div>

    <script>
        let currentLotCode = '67';

        function switchLottery(lotCode, name, btn) {
            currentLotCode = lotCode;
            document.getElementById('titleText').innerText = name;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            fetchData();
        }

        async function fetchData() {
            const container = document.getElementById('dataContainer');

            try {
                const res = await fetch(`/api/get-lottery?lotCode=${currentLotCode}`);
                const data = await res.json();

                console.log("後端回傳資料：", data); // 按 F12 可在 Console 查看細節

                if (data && data.result && data.result.data && data.result.data.length > 0) {
                    const list = data.result.data;
                    
                    // 自動計算下期期號
                    const latestPeriod = list[0].period;
                    if (latestPeriod) {
                        document.getElementById('nextPeriod').innerText = (parseInt(latestPeriod) + 1).toString();
                    }

                    container.innerHTML = "";
                    list.forEach(item => {
                        // 支援逗號、空白、多重分隔字元
                        const nums = item.number.split(/[, ]+/);

                        let numsHtml = "";
                        nums.forEach((n, idx) => {
                            if (n.trim()) {
                                const numVal = parseInt(n.trim(), 10);
                                const formattedNum = String(numVal).padStart(2, '0');
                                
                                // 舊版邏輯：1~5號綠底，6~10號紅底 (或依位置/數值)
                                const bgClass = (numVal <= 5) ? 'bg-green' : 'bg-red';

                                numsHtml += `<div class="num-box ${bgClass}">${formattedNum}</div>`;
                            }
                        });

                        container.innerHTML += `
                            <div class="data-row">
                                <div class="period-no">${item.period.slice(-6)}</div>
                                ${numsHtml}
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<div class="status-msg">⚠️ 暫無開獎資料 (請確認 Token 是否有效)</div>`;
                }
            } catch (err) {
                console.error("Fetch 錯誤：", err);
                container.innerHTML = `<div class="status-msg">❌ 無法連線至 Python 後端</div>`;
            }
        }

        // 倒數模擬
        let secondsLeft = 45;
        function updateTimer() {
            if (secondsLeft <= 0) {
                secondsLeft = 75;
                fetchData();
            }
            const mins = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
            const secs = String(secondsLeft % 60).padStart(2, '0');
            document.getElementById('countdownTimer').innerText = `${mins} : ${secs}`;
            secondsLeft--;
        }

        fetchData();
        setInterval(updateTimer, 1000);
        setInterval(fetchData, 10000);
    </script>

</body>
</html>
