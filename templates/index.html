<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 關鍵：加上 Viewport，讓手機自動以 1:1 比例呈現，字體與按鈕才會變大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史頭尾數據動態對比看板</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0b141e;
            color: #ffffff;
            margin: 0;
            padding: 15px 8px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #121e2b;
            padding: 15px 10px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        h2 { 
            text-align: center; 
            color: #4da6ff; 
            margin: 5px 0 12px 0;
            font-size: 22px;
        }
        
        .info-bar {
            text-align: center;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 12px;
            background: #1a2838;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* 支援手機橫向滑動 */
            -webkit-overflow-scrolling: touch;
        }

        .lottery-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            min-width: 580px; /* 確保 10 個號碼有足夠寬度不被壓扁 */
        }
        .lottery-row {
            background-color: #1a2838;
            border-radius: 8px;
        }
        .period-cell {
            padding: 10px 8px;
            font-size: 16px; /* 加大期數字體 */
            font-weight: bold;
            color: #cbd5e0;
            text-align: center;
            width: 90px;
            white-space: nowrap;
        }
        .numbers-cell {
            padding: 8px 5px;
            display: flex;
            gap: 6px;
            justify-content: flex-start;
        }

        /* 放大號碼方塊與字體 */
        .num-box {
            min-width: 42px;
            height: 52px; /* 加高方塊，手機更好按更清晰 */
            color: #ffffff;
            font-size: 22px; /* 加大號碼字體 */
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.3);
            flex: 1;
        }

        /* 頭五號：綠色 */
        .num-box.green {
            background: linear-gradient(180deg, #38a169 0%, #2f855a 100%);
            border: 1px solid #68d391;
        }

        /* 後五號：紅色 */
        .num-box.red {
            background: linear-gradient(180deg, #e53e3e 0%, #c53030 100%);
            border: 1px solid #fc8181;
        }

        /* 備用：藍色 */
        .num-box.blue {
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border: 1px solid #4299e1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎰 歷史順序動態對比看板</h2>
        <div class="info-bar">
            💡 <b>計算規則：</b> 每期採計「該期前 30 期歷史」推算頭尾歸屬<br>
            🟢 <b>頭五號</b> (綠色) | 🔴 <b>後五號</b> (紅色) | 最新 30 期
        </div>
        
        <div id="status" style="text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 13px;"></div>

        <div class="table-wrapper">
            <table class="lottery-table">
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function getHeadTailForPosition(pastRecords, posIndex) {
            let seenNumbers = [];
            for (let item of pastRecords) {
                const nums = item.number.replace(/\s+/g, '').split(',');
                if (nums[posIndex] !== undefined) {
                    const val = parseInt(nums[posIndex], 10);
                    if (!seenNumbers.includes(val)) {
                        seenNumbers.push(val);
                    }
                }
                if (seenNumbers.length === 10) break;
            }

            const headSet = new Set(seenNumbers.slice(0, 5));
            const tailSet = new Set(seenNumbers.slice(5, 10));

            return { headSet, tailSet };
        }

        async function fetchData() {
            const statusDiv = document.getElementById('status');
            const tableBody = document.getElementById('tableBody');
            const apiUrl = "/api/get-lottery";

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.result && data.result.data) {
                    const fullData = data.result.data;
                    const displayData = fullData.slice(0, 30);

                    statusDiv.innerHTML = '<span style="color: #68d391;">✅ 即時同步中 (近 30 期頭尾動態比對)</span>';
                    tableBody.innerHTML = "";

                    displayData.forEach((item, index) => {
                        const pastRecords = fullData.slice(index + 1);
                        const nums = item.number.replace(/\s+/g, '').split(',');

                        const numBoxesHtml = nums.map((n, posIndex) => {
                            const val = parseInt(n, 10);
                            let colorClass = 'blue';

                            if (pastRecords.length > 0) {
                                const { headSet, tailSet } = getHeadTailForPosition(pastRecords, posIndex);
                                if (headSet.has(val)) {
                                    colorClass = 'green';
                                } else if (tailSet.has(val)) {
                                    colorClass = 'red';
                                }
                            }

                            const displayNum = val < 10 ? `0${val}` : `${val}`;
                            return `<div class="num-box ${colorClass}">${displayNum}</div>`;
                        }).join('');

                        const row = `
                            <tr class="lottery-row">
                                <td class="period-cell">${item.period}</td>
                                <td>
                                    <div class="numbers-cell">
                                        ${numBoxesHtml}
                                    </div>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '<span style="color: #fc8181;">⚠️ 請確認 Python 後端是否啟動中！</span>';
            }
        }

        fetchData();
        setInterval(fetchData, 5000);
    </script>

</body>
</html>
