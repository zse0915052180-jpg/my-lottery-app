<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 啟用 Viewport 與強制縮放比例，確保手機直立時完美滿版 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史頭尾數據動態對比看板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b141e;
            color: #ffffff;
            padding: 8px 4px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #121e2b;
            padding: 10px 6px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* 精簡頂部區域，釋放直向高度空間 */
        h2 { 
            text-align: center; 
            color: #4da6ff; 
            margin: 4px 0 6px 0;
            font-size: 18px;
        }
        .info-bar {
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 8px;
            background: #1a2838;
            padding: 6px;
            border-radius: 6px;
            line-height: 1.4;
        }

        .table-wrapper {
            width: 100%;
        }

        .lottery-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px; /* 控制上下每期的間距 */
        }
        .lottery-row {
            background-color: #1a2838;
            border-radius: 6px;
        }
        
        /* 期數欄位：縮緊寬度，把所有空間留給 10 個號碼 */
        .period-cell {
            padding: 8px 2px;
            font-size: 11px;
            font-weight: bold;
            color: #cbd5e0;
            text-align: center;
            width: 60px;
            white-space: nowrap;
        }
        
        .numbers-cell {
            padding: 6px 4px 6px 0;
            display: flex;
            gap: 3px; /* 緊湊間距，確保 10 個方塊全顯不爆開 */
            justify-content: space-between;
        }

        /* 號碼方塊：依手機寬度自動平分，10 個號碼一目瞭然 */
        .num-box {
            flex: 1;
            height: 44px; /* 加高方塊，視覺效果更大器 */
            color: #ffffff;
            font-size: 16px; /* 數字大且醒目 */
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 頭五號：綠色 */
        .num-box.green {
            background: linear-gradient(180deg, #38a169 0%, #2f855a 100%);
            border: 1px solid #68d391;
        }

        /* 後五號：紅色 */
        .num-box.red {
            background: linear-gradient(180deg, #e53e3e 0%, #c53030 100%);
            border: 1px solid #fc8181;
        }

        /* 備用：藍色 */
        .num-box.blue {
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border: 1px solid #4299e1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎰 歷史頭尾動態看板</h2>
        <div class="info-bar">
            💡 採計該期前 30 期推算頭尾歸屬<br>
            🟢 <b>頭五</b> | 🔴 <b>後五</b> | 最新 30 期
        </div>
        
        <div id="status" style="text-align: center; margin-bottom: 6px; font-weight: bold; font-size: 11px;"></div>

        <div class="table-wrapper">
            <table class="lottery-table">
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function getHeadTailForPosition(pastRecords, posIndex) {
            let seenNumbers = [];
            for (let item of pastRecords) {
                const nums = item.number.replace(/\s+/g, '').split(',');
                if (nums[posIndex] !== undefined) {
                    const val = parseInt(nums[posIndex], 10);
                    if (!seenNumbers.includes(val)) {
                        seenNumbers.push(val);
                    }
                }
                if (seenNumbers.length === 10) break;
            }

            const headSet = new Set(seenNumbers.slice(0, 5));
            const tailSet = new Set(seenNumbers.slice(5, 10));

            return { headSet, tailSet };
        }

        async function fetchData() {
            const statusDiv = document.getElementById('status');
            const tableBody = document.getElementById('tableBody');
            const apiUrl = "/api/get-lottery";

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.result && data.result.data) {
                    const fullData = data.result.data;
                    const displayData = fullData.slice(0, 30);

                    statusDiv.innerHTML = '<span style="color: #68d391;">✅ 即時同步中 (近 30 期滾動比對)</span>';
                    tableBody.innerHTML = "";

                    displayData.forEach((item, index) => {
                        const pastRecords = fullData.slice(index + 1);
                        const nums = item.number.replace(/\s+/g, '').split(',');

                        const numBoxesHtml = nums.map((n, posIndex) => {
                            const val = parseInt(n, 10);
                            let colorClass = 'blue';

                            if (pastRecords.length > 0) {
                                const { headSet, tailSet } = getHeadTailForPosition(pastRecords, posIndex);
                                if (headSet.has(val)) {
                                    colorClass = 'green';
                                } else if (tailSet.has(val)) {
                                    colorClass = 'red';
                                }
                            }

                            const displayNum = val < 10 ? `0${val}` : `${val}`;
                            return `<div class="num-box ${colorClass}">${displayNum}</div>`;
                        }).join('');

                        // 截取期數後半段，避免字體過長佔用空間
                        const shortPeriod = item.period.length > 7 ? item.period.slice(-6) : item.period;

                        const row = `
                            <tr class="lottery-row">
                                <td class="period-cell" title="${item.period}">${shortPeriod}</td>
                                <td>
                                    <div class="numbers-cell">
                                        ${numBoxesHtml}
                                    </div>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '<span style="color: #fc8181;">⚠️ 請確認 Python 後端是否啟動中！</span>';
            }
        }

        fetchData();
        setInterval(fetchData, 5000);
    </script>

</body>
</html>
