<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史頭尾數據動態對比看板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b141e;
            color: #ffffff;
            padding: 6px 4px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: #121e2b;
            padding: 8px 6px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 2px;
        }
        h2 { 
            color: #4da6ff; 
            font-size: 16px;
        }
        .lottery-tabs {
            display: flex;
            gap: 5px;
        }
        .tab-btn {
            background-color: #1a2838;
            color: #a0aec0;
            border: 1px solid #2b3e50;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #3182ce;
            color: #ffffff;
            border-color: #63b3ed;
            box-shadow: 0 0 6px rgba(49, 130, 206, 0.5);
        }

        .info-bar {
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 6px;
            background: #1a2838;
            padding: 5px;
            border-radius: 6px;
            line-height: 1.4;
        }

        /* 🟢 新增：模式切換按鈕區塊 */
        .mode-tabs {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .mode-btn {
            background-color: #112538;
            color: #a0aec0;
            border: 1px solid #2b3e50;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #d69e2e;
            color: #ffffff;
            border-color: #f6e05e;
            box-shadow: 0 0 6px rgba(214, 158, 46, 0.5);
        }

        .countdown-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #0d1926;
            padding: 3px 6px;
            border-radius: 4px;
            margin-top: 6px;
            font-size: 12px;
            font-weight: bold;
            color: #e2e8f0;
            border: 1px solid #2b3e50;
        }
        .timer-highlight {
            color: #f6ad55;
            font-size: 13px;
            font-family: monospace;
        }
        .timer-highlight.red {
            color: #fc8181;
        }

        .table-wrapper {
            width: 100%;
        }

        .lottery-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 3px;
        }

        .period-header {
            font-size: 11px;
            color: #718096;
            font-weight: bold;
            text-align: center;
            width: 50px;
            padding-bottom: 2px;
        }
        .rank-header-container {
            display: flex;
            gap: 2px;
            padding-right: 2px;
        }

        .rank-header-item {
            flex: 1;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #63b3ed;
            padding: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
            background-color: rgba(99, 179, 237, 0.15);
        }
        .rank-header-item:active {
            background-color: rgba(99, 179, 237, 0.4);
        }

        /* 📜 歷史數據區 */
        .table-scroll-container {
            max-height: 304px;
            overflow-y: auto;
            border-radius: 4px;
            padding-right: 2px;
        }
        .table-scroll-container::-webkit-scrollbar {
            width: 3px;
        }
        .table-scroll-container::-webkit-scrollbar-thumb {
            background: #2b3e50;
            border-radius: 3px;
        }

        .lottery-row {
            background-color: #1a2838;
            border-radius: 4px;
        }
        
        .period-cell {
            padding: 2px;
            font-size: 10px;
            font-weight: bold;
            color: #cbd5e0;
            text-align: center;
            width: 50px;
            white-space: nowrap;
        }
        
        .numbers-cell {
            padding: 3px 2px 3px 0;
            display: flex;
            gap: 2px;
            justify-content: space-between;
        }

        .num-box {
            flex: 1;
            height: 28px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.3);
        }

        .num-box.green {
            background: linear-gradient(180deg, #38a169 0%, #2f855a 100%);
            border: 1px solid #68d391;
        }

        .num-box.red {
            background: linear-gradient(180deg, #e53e3e 0%, #c53030 100%);
            border: 1px solid #fc8181;
        }

        .num-box.blue {
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border: 1px solid #4299e1;
        }

        /* ---------------------------------------------------- */
        /* 🧮 下方：金額與關數區域 */
        /* ---------------------------------------------------- */
        .calculator-area {
            margin-top: 8px;
            background-color: #0d1926;
            border-radius: 8px;
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .calc-input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .input-label {
            color: #63b3ed;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        .white-input {
            width: 100%;
            height: 35px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 5px;
            padding: 0 6px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }

        .clickable-box {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a202c;
        }
        .clickable-box:active {
            background-color: #e2e8f0;
        }

        .confirm-btn {
            height: 35px;
            padding: 0 10px;
            background: linear-gradient(180deg, #48bb78 0%, #38a169 100%);
            border: 1px solid #68d391;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(56, 161, 105, 0.4);
            flex-shrink: 0;
            white-space: nowrap;
            transition: transform 0.1s;
        }

        .confirm-btn:active {
            transform: scale(0.95);
        }

        /* 📊 計算結果表格 */
        .result-table-container {
            display: none;
            margin-top: 4px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2b3e50;
            background-color: #1a2838;
        }

        .calc-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 13px;
        }

        .calc-table th {
            background-color: #121e2b;
            color: #63b3ed;
            font-weight: bold;
            padding: 6px 3px;
            border-bottom: 1px solid #2b3e50;
            border-right: 1px solid #2b3e50;
        }
        .calc-table th:last-child {
            border-right: none;
        }

        .calc-table td {
            padding: 6px 3px;
            border-bottom: 1px solid #2b3e50;
            border-right: 1px solid #2b3e50;
            color: #ffffff;
            font-weight: bold;
            vertical-align: middle;
        }
        .calc-table td:last-child {
            border-right: none;
        }
        .calc-table tr:last-child td {
            border-bottom: none;
        }

        .copyable-amount {
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
            user-select: none;
        }
        .copyable-amount:active {
            background-color: #3182ce !important;
            color: #ffffff !important;
        }

        .round-label {
            color: #a0aec0;
            font-weight: bold;
            background-color: #14202e;
            width: 28%;
            font-size: 12px;
        }

        .profit-val {
            color: #68d391;
            font-size: 17px;
            background-color: #121e2b;
        }

        /* 彈窗樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background-color: #121e2b;
            border: 1px solid #2b3e50;
            border-radius: 8px;
            padding: 12px;
            width: 85%;
            max-width: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 4px; right: 8px;
            font-size: 18px;
            color: #a0aec0;
            cursor: pointer;
        }
        .modal-title {
            color: #4da6ff;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            border-bottom: 1px solid #2b3e50;
            padding-bottom: 4px;
        }
        .modal-content-box {
            background: #1a2838;
            padding: 8px 10px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.6;
            font-weight: bold;
        }
        .text-green { color: #68d391; }
        .text-red { color: #fc8181; }

        .round-options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .round-option-item {
            background-color: #1a2838;
            border: 1px solid #2b3e50;
            color: #63b3ed;
            font-size: 15px;
            font-weight: bold;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .round-option-item:active {
            background-color: #3182ce;
            color: #ffffff;
        }

        .toast-msg {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(49, 130, 206, 0.95);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h2>🎰 <span id="lotteryTitle">極速飛艇</span></h2>
            <div class="lottery-tabs">
                <button id="btn10035" class="tab-btn active" onclick="switchLottery('10035', '極速飛艇')">🚀 極速飛艇</button>
                <button id="btn10057" class="tab-btn" onclick="switchLottery('10057', '幸運飛艇')">⛵ 幸運飛艇</button>
            </div>
        </div>

        <div class="info-bar">
            <!-- 🔄 新增：模式切換按鈕區塊 -->
            <div class="mode-tabs">
                <button id="modeBtn5" class="mode-btn active" onclick="switchMode(5)">頭五 / 後五</button>
                <button id="modeBtn3" class="mode-btn" onclick="switchMode(3)">頭三 / 後七</button>
                <button id="modeBtn6" class="mode-btn" onclick="switchMode(6)">頭六 / 後四</button>
            </div>

            🟢 <b id="headLabel">頭五</b> | 🔴 <b id="tailLabel">後五</b> | 點擊<b>「冠~十」</b>查順反

            <div class="countdown-box">
                <span id="nextPeriodText">下期: --</span>
                <span id="timerText" class="timer-highlight">同步中...</span>
            </div>
        </div>

        <div class="table-wrapper">
            <!-- 表頭 -->
            <table class="lottery-table">
                <thead>
                    <tr>
                        <th class="period-header">期號</th>
                        <th>
                            <div class="rank-header-container">
                                <div class="rank-header-item" onclick="showPositionModal(0, '冠')">冠</div>
                                <div class="rank-header-item" onclick="showPositionModal(1, '亞')">亞</div>
                                <div class="rank-header-item" onclick="showPositionModal(2, '三')">三</div>
                                <div class="rank-header-item" onclick="showPositionModal(3, '四')">四</div>
                                <div class="rank-header-item" onclick="showPositionModal(4, '五')">五</div>
                                <div class="rank-header-item" onclick="showPositionModal(5, '六')">六</div>
                                <div class="rank-header-item" onclick="showPositionModal(6, '七')">七</div>
                                <div class="rank-header-item" onclick="showPositionModal(7, '八')">八</div>
                                <div class="rank-header-item" onclick="showPositionModal(8, '九')">九</div>
                                <div class="rank-header-item" onclick="showPositionModal(9, '十')">十</div>
                            </div>
                        </th>
                    </tr>
                </thead>
            </table>

            <!-- 表身 -->
            <div class="table-scroll-container">
                <table class="lottery-table">
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 🧮 下方：金額與關數輸入區域 -->
        <div class="calculator-area">
            <div class="calc-input-row">
                <div class="input-group">
                    <span class="input-label">金額</span>
                    <input type="number" id="inputAmount" class="white-input" placeholder="">
                </div>
                
                <div class="input-group">
                    <span class="input-label">關數</span>
                    <div id="inputRoundDisplay" class="white-input clickable-box" onclick="openRoundModal()"></div>
                </div>

                <button class="confirm-btn" onclick="onConfirmClick()">確認計算</button>
            </div>

            <!-- 📊 計算結果表格區 -->
            <div id="resultTableContainer" class="result-table-container">
                <table class="calc-table">
                    <thead>
                        <tr>
                            <th style="width: 28%;">關數</th>
                            <th style="width: 36%;">金額 (點擊複製)</th>
                            <th style="width: 36%;">獲利</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 📋 複製提示浮窗 -->
    <div id="toastMsg" class="toast-msg"></div>

    <!-- 1. 冠~十 名次對比彈窗 -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModalDirect()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModalDirect()">&times;</span>
            <div id="modalTitle" class="modal-title">名次對比</div>
            
            <div class="modal-content-box">
                <div class="text-green">順 : <span id="headText"></span></div>
                <div class="text-red">反 : <span id="tailText"></span></div>
            </div>
        </div>
    </div>

    <!-- 2. 關數選擇彈窗 -->
    <div id="roundModalOverlay" class="modal-overlay" onclick="closeRoundModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeRoundModal()">&times;</span>
            <div class="modal-title">選擇關數 (1~7)</div>
            
            <div class="round-options-grid">
                <div class="round-option-item" onclick="selectRoundValue(1)">1</div>
                <div class="round-option-item" onclick="selectRoundValue(2)">2</div>
                <div class="round-option-item" onclick="selectRoundValue(3)">3</div>
                <div class="round-option-item" onclick="selectRoundValue(4)">4</div>
                <div class="round-option-item" onclick="selectRoundValue(5)">5</div>
                <div class="round-option-item" onclick="selectRoundValue(6)">6</div>
                <div class="round-option-item" onclick="selectRoundValue(7)">7</div>
            </div>
        </div>
    </div>

    <script>
        let globalFullData = [];
        let currentLotCode = '10035';
        let countdownTimer = null;
        let targetEndTimeMs = 0;
        let lastPeriodLoaded = "";
        
        // 🟢 定義當前模式基準值 (預設為 5：頭五/後五)
        let currentSplit = 5; 

        const chineseRounds = ["第一關", "第二關", "第三關", "第四關", "第五關", "第六關", "第七關"];

        const divisorsMap = {
            1: 5,
            2: 15,
            3: 37,
            4: 81,
            5: 175,
            6: 359,
            7: 747
        };

        // 🔄 切換頭尾判定模式
        function switchMode(splitValue) {
            if (currentSplit === splitValue) return;
            currentSplit = splitValue;

            // 更新按鈕狀態
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`modeBtn${splitValue}`).classList.add('active');

            // 更新文字標籤
            const headMap = { 3: "三", 5: "五", 6: "六" };
            const tailMap = { 3: "七", 5: "五", 6: "四" };
            
            document.getElementById('headLabel').innerText = `頭${headMap[splitValue]}`;
            document.getElementById('tailLabel').innerText = `後${tailMap[splitValue]}`;

            // 即時重繪表格
            renderTableUI();
        }

        function openRoundModal() {
            document.getElementById('roundModalOverlay').style.display = 'flex';
        }

        function closeRoundModal() {
            document.getElementById('roundModalOverlay').style.display = 'none';
        }

        function selectRoundValue(val) {
            document.getElementById('inputRoundDisplay').innerText = val;
            closeRoundModal();
        }

        function copyAmount(textVal, rawNum) {
            navigator.clipboard.writeText(rawNum.toString()).then(() => {
                showToast(`已複製金額：${textVal}`);
            }).catch(err => {
                const tempInput = document.createElement('input');
                tempInput.value = rawNum;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                showToast(`已複製金額：${textVal}`);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 1500);
        }

        function onConfirmClick() {
            const amountInput = document.getElementById('inputAmount').value;
            const roundInput = document.getElementById('inputRoundDisplay').innerText;

            if (!amountInput || parseFloat(amountInput) <= 0) {
                alert("請填寫有效的金額！");
                return;
            }
            if (!roundInput) {
                alert("請點擊選擇關數！");
                return;
            }

            const amount = parseFloat(amountInput);
            const selectedRounds = parseInt(roundInput, 10);
            const divisor = divisorsMap[selectedRounds];

            const firstRoundAmount = amount / divisor;
            const fixedProfit = firstRoundAmount * 4.7;

            const resultContainer = document.getElementById('resultTableContainer');
            const resultBody = document.getElementById('resultTableBody');

            resultBody.innerHTML = "";

            let currentRoundAmount = firstRoundAmount;

            const formattedProfit = Math.round(fixedProfit).toLocaleString();

            for (let i = 0; i < selectedRounds; i++) {
                const roundText = chineseRounds[i] || `第${i+1}關`;

                if (i > 0) {
                    currentRoundAmount = currentRoundAmount * 2.065;
                }

                const rawVal = Math.round(currentRoundAmount);
                const formattedAmount = rawVal.toLocaleString();

                let rowHtml = "";
                if (i === 0) {
                    rowHtml = `
                        <tr>
                            <td class="round-label">${roundText}</td>
                            <td class="copyable-amount" onclick="copyAmount('${formattedAmount}', ${rawVal})" title="點擊複製">${formattedAmount}</td>
                            <td class="profit-val" rowspan="${selectedRounds}">${formattedProfit}</td>
                        </tr>
                    `;
                } else {
                    rowHtml = `
                        <tr>
                            <td class="round-label">${roundText}</td>
                            <td class="copyable-amount" onclick="copyAmount('${formattedAmount}', ${rawVal})" title="點擊複製">${formattedAmount}</td>
                        </tr>
                    `;
                }

                resultBody.innerHTML += rowHtml;
            }

            resultContainer.style.display = 'block';
        }

        function switchLottery(code, name) {
            if (currentLotCode === code) return;
            currentLotCode = code;

            document.getElementById('lotteryTitle').innerText = name;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn${code}`).classList.add('active');

            if (countdownTimer) clearInterval(countdownTimer);
            targetEndTimeMs = 0;
            lastPeriodLoaded = "";
            document.getElementById('timerText').innerText = '同步中...';

            fetchData();
        }

        function getHeadTailForPosition(pastRecords, posIndex) {
            let seenNumbers = [];
            for (let item of pastRecords) {
                const nums = item.number.replace(/\s+/g, '').split(',');
                if (nums[posIndex] !== undefined) {
                    const val = parseInt(nums[posIndex], 10);
                    if (!seenNumbers.includes(val)) {
                        seenNumbers.push(val);
                    }
                }
                if (seenNumbers.length === 10) break;
            }

            // 🎯 使用動態的 currentSplit 切割頭尾
            const headList = seenNumbers.slice(0, currentSplit);
            const tailList = seenNumbers.slice(currentSplit, 10);

            return { headList, tailList };
        }

        function showPositionModal(posIndex, titleName) {
            if (!globalFullData || globalFullData.length === 0) return;

            const { headList, tailList } = getHeadTailForPosition(globalFullData, posIndex);

            document.getElementById('modalTitle').innerText = `【${titleName}】當前對比`;

            const sortedHead = [...headList].sort((a, b) => a - b);
            const sortedTail = [...tailList].sort((a, b) => a - b);

            const headStr = sortedHead.join(' . ') + ' 號';
            const tailStr = sortedTail.join(' . ') + ' 號';

            document.getElementById('headText').innerText = headStr;
            document.getElementById('tailText').innerText = tailStr;

            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                const nowMs = Date.now();
                const totalRemSec = Math.floor((targetEndTimeMs - nowMs) / 1000);
                const timerEl = document.getElementById('timerText');

                const closeThreshold = (currentLotCode === '10035') ? 15 : 80;

                if (totalRemSec > closeThreshold) {
                    const closeSec = totalRemSec - closeThreshold;
                    const mm = String(Math.floor(closeSec / 60)).padStart(2, '0');
                    const ss = String(closeSec % 60).padStart(2, '0');
                    timerEl.className = "timer-highlight";
                    timerEl.innerText = `⏳ 距封盤: ${mm} : ${ss}`;
                } else if (totalRemSec > 0) {
                    const mm = String(Math.floor(totalRemSec / 60)).padStart(2, '0');
                    const ss = String(totalRemSec % 60).padStart(2, '0');
                    timerEl.className = "timer-highlight red";
                    timerEl.innerText = `🎲 距開獎: ${mm} : ${ss}`;
                } else {
                    timerEl.className = "timer-highlight red";
                    timerEl.innerText = `🎰 開獎中...`;
                    fetchData();
                }
            }, 1000);
        }

        function renderTableUI() {
            const tableBody = document.getElementById('tableBody');
            if (!globalFullData || globalFullData.length === 0) return;

            tableBody.innerHTML = "";

            // 渲染正常的歷史紀錄
            const displayData = globalFullData.slice(0, 30);

            displayData.forEach((item, index) => {
                const pastRecords = globalFullData.slice(index + 1);
                const nums = item.number.replace(/\s+/g, '').split(',');

                const numBoxesHtml = nums.map((n, posIndex) => {
                    const val = parseInt(n, 10);
                    let colorClass = 'blue';

                    if (pastRecords.length > 0) {
                        const { headList, tailList } = getHeadTailForPosition(pastRecords, posIndex);
                        const headSet = new Set(headList);
                        const tailSet = new Set(tailList);

                        if (headSet.has(val)) {
                            colorClass = 'green';
                        } else if (tailSet.has(val)) {
                            colorClass = 'red';
                        }
                    }

                    const displayNum = val < 10 ? `0${val}` : `${val}`;
                    return `<div class="num-box ${colorClass}">${displayNum}</div>`;
                }).join('');

                const shortPeriod = item.period.length > 7 ? item.period.slice(-6) : item.period;

                const row = `
                    <tr class="lottery-row">
                        <td class="period-cell" title="${item.period}">${shortPeriod}</td>
                        <td>
                            <div class="numbers-cell">
                                ${numBoxesHtml}
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        async function fetchData() {
            const apiUrl = `/api/get-lottery?lotCode=${currentLotCode}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.result && data.result.data && data.result.data.length > 0) {
                    globalFullData = data.result.data;
                    const currentTopPeriod = globalFullData[0].period;

                    const latestPeriod = BigInt(currentTopPeriod);
                    const nextPeriodStr = (latestPeriod + 1n).toString();
                    const shortNextPeriod = nextPeriodStr.length > 7 ? nextPeriodStr.slice(-6) : nextPeriodStr;
                    document.getElementById('nextPeriodText').innerText = `下期: ${shortNextPeriod}`;

                    if (currentTopPeriod !== lastPeriodLoaded || targetEndTimeMs === 0) {
                        lastPeriodLoaded = currentTopPeriod;
                        if (data.remSeconds !== null && data.remSeconds !== undefined) {
                            targetEndTimeMs = Date.now() + (parseInt(data.remSeconds, 10) * 1000);
                            startCountdown();
                        }
                    }

                    renderTableUI();
                }
            } catch (error) {
                console.error(error);
            }
        }

        fetchData();
        setInterval(fetchData, 3000);
    </script>

</body>
</html>
