<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史頭尾數據動態對比看板 - 策略計算風</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            padding: 8px 4px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            padding: 12px 10px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 8px;
        }
        h2 { color: #0f172a; font-size: 15px; font-weight: 700; }
        .lottery-tabs { display: flex; gap: 6px; }
        .tab-btn {
            background-color: #f8fafc;
            color: #64748b;
            border: 1px solid #cbd5e1;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #0ea5e9;
            color: #ffffff;
            border-color: #0284c7;
            box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
        }
        .info-bar {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            margin-bottom: 10px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .mode-tabs {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap; 
            margin-bottom: 6px;
        }
        .mode-btn {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 3px 8px;
            font-size: 10.5px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .mode-btn.active {
            background-color: #d97706;
            color: #ffffff;
            border-color: #b45309;
        }
        .countdown-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #ffffff;
            padding: 5px 8px;
            border-radius: 6px;
            margin-top: 6px;
            font-size: 11.5px;
            font-weight: 600;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .timer-highlight { color: #d97706; font-family: monospace; font-size: 12px; }
        .timer-highlight.red { color: #dc2626; }
        .table-wrapper { width: 100%; }
        .lottery-table { width: 100%; border-collapse: separate; border-spacing: 0.5px 2px; }
        .period-header { font-size: 10.5px; color: #64748b; font-weight: 600; text-align: center; width: 48px; }
        .rank-header-container { display: flex; gap: 2px; }
        .rank-header-item {
            flex: 1;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #0284c7;
            padding: 4px 0;
            cursor: pointer;
            border-radius: 4px;
            background-color: #e0f2fe;
            border: 1px solid #bae6fd;
        }
        .rank-header-item:active { background-color: #bae6fd; }
        .table-scroll-container {
            max-height: 295px;
            overflow-y: auto;
            border-radius: 4px;
        }
        .table-scroll-container::-webkit-scrollbar { width: 3px; }
        .table-scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .lottery-row { background-color: #ffffff; }
        .period-cell { padding: 2px; font-size: 10px; font-weight: 600; color: #475569; text-align: center; width: 48px; }
        .numbers-cell { padding: 2px 2px 2px 0; display: flex; gap: 2px; justify-content: space-between; }
        .num-box {
            flex: 1;
            height: 26px;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .num-box.green { background-color: #10b981; }
        .num-box.red { background-color: #ef4444; }
        .num-box.blue { background-color: #3b82f6; }

        /* 策略選單橫向區域 */
        .strategy-area {
            margin-top: 10px;
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            gap: 6px;
            overflow-x: auto;
        }
        .strategy-btn {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 5px 12px;
            font-size: 11.5px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .strategy-btn.active {
            background-color: #0284c7;
            color: #ffffff;
            border-color: #0369a1;
            box-shadow: 0 2px 4px rgba(2, 132, 199, 0.3);
        }

        .calculator-area {
            margin-top: 10px;
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .calc-input-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
        .input-group { display: flex; align-items: center; gap: 3px; flex: 1; }
        .input-label { color: #0284c7; font-size: 12px; font-weight: 700; white-space: nowrap; }
        .white-input {
            width: 100%;
            height: 32px;
            background-color: #ffffff;
            color: #0f172a;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        .clickable-box { cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; }
        .confirm-btn {
            height: 32px;
            padding: 0 10px;
            background-color: #10b981;
            border: 1px solid #059669;
            color: #ffffff;
            font-size: 11.5px;
            font-weight: 700;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
            transition: transform 0.1s ease, background-color 0.1s ease, box-shadow 0.1s ease;
        }
        .confirm-btn:active {
            transform: scale(0.93);
            background-color: #059669;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .result-table-container { display: none; margin-top: 4px; border-radius: 6px; overflow: hidden; border: 1px solid #cbd5e1; }
        .calc-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 12px; }
        .calc-table th { background-color: #f1f5f9; color: #0284c7; font-weight: 700; padding: 5px; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; }
        .calc-table th:last-child { border-right: none; }
        .calc-table td { padding: 5px; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; color: #1e293b; font-weight: 700; }
        .calc-table td:last-child { border-right: none; }
        .round-label { color: #475569; background-color: #f8fafc; }
        .profit-val { color: #10b981; font-size: 15px; background-color: #f1f5f9; }
        .copyable-amount { cursor: pointer; }
        .copyable-amount:active { background-color: #e0f2fe !important; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background-color: #ffffff; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; width: 85%; max-width: 280px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-close { position: absolute; top: 4px; right: 8px; font-size: 16px; color: #64748b; cursor: pointer; }
        .modal-title { color: #0284c7; font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; }
        .modal-content-box { background: #f8fafc; padding: 8px; border-radius: 6px; font-size: 12px; line-height: 1.5; font-weight: 700; border: 1px solid #e2e8f0; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
        .round-options-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .round-option-item { background-color: #f1f5f9; border: 1px solid #cbd5e1; color: #0284c7; font-size: 14px; font-weight: 700; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; }
        .round-option-item:active { background-color: #0ea5e9; color: #fff; }
        .toast-msg { display: none; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background-color: rgba(14, 165, 233, 0.95); color: #fff; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 2000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-area">
            <h2>📊 <span id="lotteryTitle">極速飛艇</span></h2>
            <div class="lottery-tabs">
                <button id="btn10035" class="tab-btn active" onclick="switchLottery('10035', '極速飛艇')">極速飛艇</button>
                <button id="btn10057" class="tab-btn" onclick="switchLottery('10057', '幸運飛艇')">幸運飛艇</button>
            </div>
        </div>
        <div class="info-bar">
            <div class="mode-tabs">
                <button id="modeBtn3" class="mode-btn" onclick="switchMode(3)">順三</button>
                <button id="modeBtn4" class="mode-btn" onclick="switchMode(4)">順四</button>
                <button id="modeBtn5" class="mode-btn active" onclick="switchMode(5)">順五</button>
                <button id="modeBtn6" class="mode-btn" onclick="switchMode(6)">順六</button>
                <button id="modeBtn7" class="mode-btn" onclick="switchMode(7)">順七</button>
                <button id="modeBtn8" class="mode-btn" onclick="switchMode(8)">順八</button>
            </div>
            🟢 <b id="headLabel">順五</b> | 🔴 <b id="tailLabel">反五</b> | 點擊<b>「冠~十」</b>查順反
            <div class="countdown-box">
                <span id="nextPeriodText">下期: --</span>
                <span id="timerText" class="timer-highlight">同步中...</span>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="lottery-table">
                <thead>
                    <tr>
                        <th class="period-header">期號</th>
                        <th>
                            <div class="rank-header-container">
                                <div class="rank-header-item" onclick="showPositionModal(0, '冠')">冠</div>
                                <div class="rank-header-item" onclick="showPositionModal(1, '亞')">亞</div>
                                <div class="rank-header-item" onclick="showPositionModal(2, '三')">三</div>
                                <div class="rank-header-item" onclick="showPositionModal(3, '四')">四</div>
                                <div class="rank-header-item" onclick="showPositionModal(4, '五')">五</div>
                                <div class="rank-header-item" onclick="showPositionModal(5, '六')">六</div>
                                <div class="rank-header-item" onclick="showPositionModal(6, '七')">七</div>
                                <div class="rank-header-item" onclick="showPositionModal(7, '八')">八</div>
                                <div class="rank-header-item" onclick="showPositionModal(8, '九')">九</div>
                                <div class="rank-header-item" onclick="showPositionModal(9, '十')">十</div>
                            </div>
                        </th>
                    </tr>
                </thead>
            </table>
            <div class="table-scroll-container">
                <table class="lottery-table"><tbody id="tableBody"></tbody></table>
            </div>
        </div>

        <!-- 橫向策略區域：倍投與複利計算切換 -->
        <div class="strategy-area">
            <button id="stratBtnBet" class="strategy-btn active" onclick="switchStrategy('bet')">倍投</button>
            <button id="stratBtnCompound" class="strategy-btn" onclick="switchStrategy('compound')">複利計算</button>
        </div>

        <div class="calculator-area">
            <!-- 倍投輸入介面 -->
            <div id="betCalcInputs" class="calc-input-row">
                <div class="input-group"><span class="input-label">金額</span><input type="number" id="inputAmount" class="white-input"></div>
                <div class="input-group"><span class="input-label">碼數</span><div id="inputCodeCountDisplay" class="white-input clickable-box" onclick="openCodeCountModal()">5</div></div>
                <div class="input-group"><span class="input-label">關數</span><div id="inputRoundDisplay" class="white-input clickable-box" onclick="openRoundModal()"></div></div>
                <button class="confirm-btn" onclick="onConfirmClick()">計算</button>
            </div>

            <!-- 複利計算輸入介面 -->
            <div id="compoundCalcInputs" class="calc-input-row" style="display: none;">
                <div class="input-group"><span class="input-label">本金</span><input type="number" id="compoundPrincipal" class="white-input" value="10000"></div>
                <div class="input-group"><span class="input-label">操作次數</span><input type="number" id="compoundTimes" class="white-input" value="10"></div>
                <div class="input-group"><span class="input-label">獲利%</span><input type="number" id="compoundRate" class="white-input" value="3.2"></div>
                <button class="confirm-btn" onclick="onCompoundConfirmClick()">計算</button>
            </div>

            <!-- 倍投結果表格 -->
            <div id="resultTableContainer" class="result-table-container">
                <table class="calc-table">
                    <thead><tr><th style="width:28%;">關數</th><th style="width:36%;">金額</th><th style="width:36%;">獲利</th></tr></thead>
                    <tbody id="resultTableBody"></tbody>
                </table>
            </div>

            <!-- 複利結果表格 (欄位已更新) -->
            <div id="compoundTableContainer" class="result-table-container">
                <table class="calc-table">
                    <thead><tr><th style="width:12%;">#</th><th style="width:32%;">單次獲利(元)</th><th style="width:32%;">總額(元)</th><th style="width:24%;">總獲利率</th></tr></thead>
                    <tbody id="compoundTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>
    <div id="modalOverlay" class="modal-overlay" onclick="closeModalDirect()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModalDirect()">&times;</span>
            <div id="modalTitle" class="modal-title">名次對比</div>
            <div class="modal-content-box"><div class="text-green">順 : <span id="headText"></span></div><div class="text-red">反 : <span id="tailText"></span></div></div>
        </div>
    </div>
    <div id="codeCountModalOverlay" class="modal-overlay" onclick="closeCodeCountModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeCodeCountModal()">&times;</span>
            <div class="modal-title">選擇碼數</div>
            <div class="round-options-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="round-option-item" onclick="selectCodeCountValue(3)">3 碼</div>
                <div class="round-option-item" onclick="selectCodeCountValue(5)">5 碼</div>
                <div class="round-option-item" onclick="selectCodeCountValue(7)">7 碼</div>
            </div>
        </div>
    </div>
    <div id="roundModalOverlay" class="modal-overlay" onclick="closeRoundModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeRoundModal()">&times;</span>
            <div class="modal-title">選擇關數</div>
            <div id="roundOptionsGrid" class="round-options-grid"></div>
        </div>
    </div>
    <script>
        let globalFullData = [], currentLotCode = '10035', countdownTimer = null, targetEndTimeMs = 0, lastPeriodLoaded = "", currentSplit = 5, currentCodeCount = 5;
        let currentStrategy = 'bet';
        const chineseRounds = ["第一關", "第二關", "第三關", "第四關", "第五關", "第六關", "第七關", "第八關", "第九關"];
        
        function switchStrategy(type) {
            currentStrategy = type;
            document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
            if (type === 'bet') {
                document.getElementById('stratBtnBet').classList.add('active');
                document.getElementById('betCalcInputs').style.display = 'flex';
                document.getElementById('compoundCalcInputs').style.display = 'none';
                document.getElementById('compoundTableContainer').style.display = 'none';
                if (document.getElementById('resultTableBody').children.length > 0) {
                    document.getElementById('resultTableContainer').style.display = 'block';
                }
            } else {
                document.getElementById('stratBtnCompound').classList.add('active');
                document.getElementById('betCalcInputs').style.display = 'none';
                document.getElementById('compoundCalcInputs').style.display = 'flex';
                document.getElementById('resultTableContainer').style.display = 'none';
                if (document.getElementById('compoundTableBody').children.length > 0) {
                    document.getElementById('compoundTableContainer').style.display = 'block';
                }
            }
        }

        function onCompoundConfirmClick() {
            const principalInput = parseFloat(document.getElementById('compoundPrincipal').value);
            const timesInput = parseInt(document.getElementById('compoundTimes').value, 10);
            const rateInput = parseFloat(document.getElementById('compoundRate').value);

            if (isNaN(principalInput) || principalInput <= 0) { alert("請填寫有效的初期本金！"); return; }
            if (isNaN(timesInput) || timesInput <= 0) { alert("請填寫有效的操作次數！"); return; }
            if (isNaN(rateInput)) { alert("請填寫有效的獲利比例！"); return; }

            let currentTotal = principalInput;
            const r = rateInput / 100;
            const resBody = document.getElementById('compoundTableBody');
            resBody.innerHTML = "";

            for (let i = 1; i <= timesInput; i++) {
                let profit = currentTotal * r;
                currentTotal += profit;
                let totalYield = ((currentTotal - principalInput) / principalInput) * 100;

                resBody.innerHTML += `<tr>
                    <td class="round-label">${i}</td>
                    <td class="text-green">+${profit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                    <td>${currentTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                    <td>${totalYield.toFixed(2)}%</td>
                </tr>`;
            }
            document.getElementById('compoundTableContainer').style.display = 'block';
        }

        function switchMode(val) {
            if (currentSplit === val) return;
            currentSplit = val;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`modeBtn${val}`).classList.add('active');
            
            const numMap = {3:"三", 4:"四", 5:"五", 6:"六", 7:"七", 8:"八"};
            const tailNumMap = {3:"七", 4:"六", 5:"五", 6:"四", 7:"三", 8:"二"};
            
            document.getElementById('headLabel').innerText = `順${numMap[val]}`;
            document.getElementById('tailLabel').innerText = `反${tailNumMap[val]}`;
            renderTableUI();
        }
        function openCodeCountModal() { document.getElementById('codeCountModalOverlay').style.display = 'flex'; }
        function closeCodeCountModal() { document.getElementById('codeCountModalOverlay').style.display = 'none'; }
        function selectCodeCountValue(val) {
            currentCodeCount = val;
            document.getElementById('inputCodeCountDisplay').innerText = val;
            
            const currentRound = parseInt(document.getElementById('inputRoundDisplay').innerText, 10);
            if (val === 3 && (isNaN(currentRound) || currentRound < 4 || currentRound > 9)) {
                document.getElementById('inputRoundDisplay').innerText = '';
            } else if (val === 5 && currentRound > 7) {
                document.getElementById('inputRoundDisplay').innerText = '';
            } else if (val === 7 && currentRound > 5) {
                document.getElementById('inputRoundDisplay').innerText = '';
            }
            closeCodeCountModal();
        }
        function openRoundModal() {
            const grid = document.getElementById('roundOptionsGrid'); grid.innerHTML = '';
            let minR = 1, maxR = 7;
            if (currentCodeCount === 3) {
                minR = 4; maxR = 9;
                grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
            } else if (currentCodeCount === 7) {
                minR = 1; maxR = 5;
                grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
            } else {
                minR = 1; maxR = 7;
                grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
            }
            
            for (let i = minR; i <= maxR; i++) {
                grid.innerHTML += `<div class="round-option-item" onclick="selectRoundValue(${i})">${i}</div>`;
            }
            document.getElementById('roundModalOverlay').style.display = 'flex';
        }
        function closeRoundModal() { document.getElementById('roundModalOverlay').style.display = 'none'; }
        function selectRoundValue(val) { document.getElementById('inputRoundDisplay').innerText = val; closeRoundModal(); }
        function copyAmount(txt, raw) {
            navigator.clipboard.writeText(raw.toString()).then(() => showToast(`已複製：${txt}`));
        }
        function showToast(msg) {
            const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        }
        function onConfirmClick() {
            const amt = parseFloat(document.getElementById('inputAmount').value), rnd = document.getElementById('inputRoundDisplay').innerText;
            if (!amt || amt <= 0) { alert("請填寫有效金額！"); return; }
            if (!rnd) { alert("請選擇關數！"); return; }
            const r = parseInt(rnd, 10);
            let div = 1, mul = 1, profMul = 1;
            
            if (currentCodeCount === 3) {
                div = {4:23, 5:36, 6:55, 7:83, 8:123, 9:181}[r];
                mul = 1.445;
                profMul = 6.7;
            } else if (currentCodeCount === 5) {
                div = {1:5, 2:15, 3:37, 4:81, 5:175, 6:359, 7:747}[r];
                mul = 2.065;
                profMul = 4.7;
            } else {
                div = {1:7, 2:33, 3:100, 4:346, 5:1222}[r];
                mul = 3.6;
                profMul = 2.7;
            }
            
            const first = Math.floor(amt / div);
            const profit = Math.floor(first * profMul).toLocaleString();
            
            const resBody = document.getElementById('resultTableBody'); resBody.innerHTML = "";
            let cur = first;
            for (let i = 0; i < r; i++) {
                if (i > 0) {
                    cur = Math.floor(cur * mul);
                }
                const raw = cur;
                const fmt = raw.toLocaleString();
                
                resBody.innerHTML += i === 0 ? `<tr><td class="round-label">${chineseRounds[i]}</td><td class="copyable-amount" onclick="copyAmount('${fmt}',${raw})">${fmt}</td><td class="profit-val" rowspan="${r}">${profit}</td></tr>` : `<tr><td class="round-label">${chineseRounds[i]}</td><td class="copyable-amount" onclick="copyAmount('${fmt}',${raw})">${fmt}</td></tr>`;
            }
            document.getElementById('resultTableContainer').style.display = 'block';
        }
        function switchLottery(code, name) {
            if (currentLotCode === code) return;
            currentLotCode = code;
            document.getElementById('lotteryTitle').innerText = name;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${code}`).classList.add('active');
            if (countdownTimer) clearInterval(countdownTimer);
            targetEndTimeMs = 0; lastPeriodLoaded = ""; document.getElementById('timerText').innerText = '同步中...';
            fetchData();
        }
        function getHeadTailForPosition(past, pos) {
            let seen = [];
            for (let item of past) {
                const nums = item.number.replace(/\s+/g, '').split(',');
                if (nums[pos] !== undefined) {
                    const v = parseInt(nums[pos], 10);
                    if (!seen.includes(v)) seen.push(v);
                }
                if (seen.length === 10) break;
            }
            return { headList: seen.slice(0, currentSplit), tailList: seen.slice(currentSplit, 10) };
        }
        function showPositionModal(pos, title) {
            if (!globalFullData.length) return;
            const { headList, tailList } = getHeadTailForPosition(globalFullData, pos);
            document.getElementById('modalTitle').innerText = `【${title}】當前對比`;
            document.getElementById('headText').innerText = [...headList].sort((a,b)=>a-b).join(' . ') + ' 號';
            document.getElementById('tailText').innerText = [...tailList].sort((a,b)=>a-b).join(' . ') + ' 號';
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModalDirect() { document.getElementById('modalOverlay').style.display = 'none'; }
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                const rem = Math.floor((targetEndTimeMs - Date.now()) / 1000), el = document.getElementById('timerText');
                const threshold = (currentLotCode === '10035') ? 15 : 80;
                if (rem > threshold) {
                    const c = rem - threshold;
                    el.className = "timer-highlight";
                    el.innerText = `⏳ 距封盤: ${String(Math.floor(c/60)).padStart(2,'0')} : ${String(c%60).padStart(2,'0')}`;
                } else if (rem > 0) {
                    el.className = "timer-highlight red";
                    el.innerText = `🎲 距開獎: ${String(Math.floor(rem/60)).padStart(2,'0')} : ${String(rem%60).padStart(2,'0')}`;
                } else {
                    el.className = "timer-highlight red"; el.innerText = `🎰 開獎中...`; fetchData();
                }
            }, 1000);
        }
        function renderTableUI() {
            const tb = document.getElementById('tableBody'); if (!globalFullData.length) return;
            tb.innerHTML = "";
            globalFullData.slice(0, 30).forEach((item, idx) => {
                const past = globalFullData.slice(idx + 1), nums = item.number.replace(/\s+/g, '').split(',');
                const boxes = nums.map((n, p) => {
                    const val = parseInt(n, 10); let cls = 'blue';
                    if (past.length > 0) {
                        const { headList, tailList } = getHeadTailForPosition(past, p);
                        if (new Set(headList).has(val)) cls = 'green';
                        else if (new Set(tailList).has(val)) cls = 'red';
                    }
                    return `<div class="num-box ${cls}">${val < 10 ? '0'+val : val}</div>`;
                }).join('');
                tb.innerHTML += `<tr class="lottery-row"><td class="period-cell">${item.period.length > 7 ? item.period.slice(-6) : item.period}</td><td><div class="numbers-cell">${boxes}</div></td></tr>`;
            });
        }
        async function fetchData() {
            try {
                const res = await fetch(`/api/get-lottery?lotCode=${currentLotCode}`), data = await res.json();
                if (data && data.result && data.result.data && data.result.data.length > 0) {
                    globalFullData = data.result.data;
                    const top = globalFullData[0].period, next = (BigInt(top) + 1n).toString();
                    document.getElementById('nextPeriodText').innerText = `下期: ${next.length > 7 ? next.slice(-6) : next}`;
                    if (top !== lastPeriodLoaded || targetEndTimeMs === 0) {
                        lastPeriodLoaded = top;
                        if (data.remSeconds != null) { targetEndTimeMs = Date.now() + (parseInt(data.remSeconds, 10) * 1000); startCountdown(); }
                    }
                    renderTableUI();
                }
            } catch (e) { console.error(e); }
        }
        fetchData(); setInterval(fetchData, 10000);
    </script>
</body>
</html>
