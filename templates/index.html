<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史頭尾數據動態對比看板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b141e;
            color: #ffffff;
            padding: 8px 4px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #121e2b;
            padding: 10px 6px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* 標題與切換按鈕區域 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
        }
        h2 { 
            color: #4da6ff; 
            font-size: 17px;
        }
        .lottery-tabs {
            display: flex;
            gap: 5px;
        }
        .tab-btn {
            background-color: #1a2838;
            color: #a0aec0;
            border: 1px solid #2b3e50;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #3182ce;
            color: #ffffff;
            border-color: #63b3ed;
            box-shadow: 0 0 8px rgba(49, 130, 206, 0.5);
        }

        .info-bar {
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 8px;
            background: #1a2838;
            padding: 6px;
            border-radius: 6px;
            line-height: 1.4;
        }

        .table-wrapper {
            width: 100%;
        }

        .lottery-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
        }

        /* 表頭欄位 */
        .period-header {
            font-size: 11px;
            color: #718096;
            font-weight: bold;
            text-align: center;
            width: 60px;
            padding-bottom: 4px;
        }
        .rank-header-container {
            display: flex;
            gap: 3px;
            padding-right: 4px;
        }
        .rank-header-item {
            flex: 1;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #63b3ed;
            padding: 2px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
            background-color: rgba(99, 179, 237, 0.1);
        }
        .rank-header-item:active {
            background-color: rgba(99, 179, 237, 0.3);
        }

        .lottery-row {
            background-color: #1a2838;
            border-radius: 6px;
        }
        
        .period-cell {
            padding: 8px 2px;
            font-size: 11px;
            font-weight: bold;
            color: #cbd5e0;
            text-align: center;
            width: 60px;
            white-space: nowrap;
        }
        
        .numbers-cell {
            padding: 6px 4px 6px 0;
            display: flex;
            gap: 3px;
            justify-content: space-between;
        }

        .num-box {
            flex: 1;
            height: 44px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.3);
        }

        .num-box.green {
            background: linear-gradient(180deg, #38a169 0%, #2f855a 100%);
            border: 1px solid #68d391;
        }

        .num-box.red {
            background: linear-gradient(180deg, #e53e3e 0%, #c53030 100%);
            border: 1px solid #fc8181;
        }

        .num-box.blue {
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border: 1px solid #4299e1;
        }

        /* 小巧精緻的彈窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background-color: #121e2b;
            border: 1px solid #2b3e50;
            border-radius: 10px;
            padding: 15px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 6px; right: 10px;
            font-size: 20px;
            color: #a0aec0;
            cursor: pointer;
        }
        .modal-title {
            color: #4da6ff;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #2b3e50;
            padding-bottom: 6px;
        }
        .modal-content-box {
            background: #1a2838;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.8;
            font-weight: bold;
        }
        .text-green { color: #68d391; }
        .text-red { color: #fc8181; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部標題與彩種切換 -->
        <div class="header-area">
            <h2>🎰 <span id="lotteryTitle">極速飛艇</span></h2>
            <div class="lottery-tabs">
                <button id="btn10059" class="tab-btn active" onclick="switchLottery('10059', '極速飛艇')">🚀 極速飛艇</button>
                <button id="btn10057" class="tab-btn" onclick="switchLottery('10057', '幸運飛艇')">⛵ 幸運飛艇</button>
            </div>
        </div>

        <div class="info-bar">
            💡 點擊上方的 <b>冠~十</b> 可查看當前順反號碼<br>
            🟢 <b>頭五</b> | 🔴 <b>後五</b> | 最新 30 期
        </div>
        
        <div id="status" style="text-align: center; margin-bottom: 6px; font-weight: bold; font-size: 11px;"></div>

        <div class="table-wrapper">
            <table class="lottery-table">
                <thead>
                    <tr>
                        <th class="period-header">期號</th>
                        <th>
                            <div class="rank-header-container">
                                <div class="rank-header-item" onclick="showPositionModal(0, '冠')">冠</div>
                                <div class="rank-header-item" onclick="showPositionModal(1, '亞')">亞</div>
                                <div class="rank-header-item" onclick="showPositionModal(2, '三')">三</div>
                                <div class="rank-header-item" onclick="showPositionModal(3, '四')">四</div>
                                <div class="rank-header-item" onclick="showPositionModal(4, '五')">五</div>
                                <div class="rank-header-item" onclick="showPositionModal(5, '六')">六</div>
                                <div class="rank-header-item" onclick="showPositionModal(6, '七')">七</div>
                                <div class="rank-header-item" onclick="showPositionModal(7, '八')">八</div>
                                <div class="rank-header-item" onclick="showPositionModal(8, '九')">九</div>
                                <div class="rank-header-item" onclick="showPositionModal(9, '十')">十</div>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 點擊空白處自動關閉的小彈窗 -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModalDirect()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModalDirect()">&times;</span>
            <div id="modalTitle" class="modal-title">名次對比</div>
            
            <div class="modal-content-box">
                <div class="text-green">順 : <span id="headText"></span></div>
                <div class="text-red">反 : <span id="tailText"></span></div>
            </div>
        </div>
    </div>

    <script>
        let globalFullData = [];
        let currentLotCode = '10059'; // 預設極速飛艇 (10059)

        // 切換彩種邏輯
        function switchLottery(code, name) {
            if (currentLotCode === code) return;
            currentLotCode = code;

            // 切換頁籤樣式與標題
            document.getElementById('lotteryTitle').innerText = name;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn${code}`).classList.add('active');

            // 立刻重新抓取新彩種的資料
            fetchData();
        }

        // 計算特定位置歷史出現順序 (頭五號、後五號)
        function getHeadTailForPosition(pastRecords, posIndex) {
            let seenNumbers = [];
            for (let item of pastRecords) {
                const nums = item.number.replace(/\s+/g, '').split(',');
                if (nums[posIndex] !== undefined) {
                    const val = parseInt(nums[posIndex], 10);
                    if (!seenNumbers.includes(val)) {
                        seenNumbers.push(val);
                    }
                }
                if (seenNumbers.length === 10) break;
            }

            const headList = seenNumbers.slice(0, 5);
            const tailList = seenNumbers.slice(5, 10);

            return { headList, tailList };
        }

        // 點擊名次表頭顯示順反彈窗
        function showPositionModal(posIndex, titleName) {
            if (!globalFullData || globalFullData.length === 0) return;

            const { headList, tailList } = getHeadTailForPosition(globalFullData, posIndex);

            document.getElementById('modalTitle').innerText = `【${titleName}】當前對比`;

            // 將號碼從小到大排序
            const sortedHead = [...headList].sort((a, b) => a - b);
            const sortedTail = [...tailList].sort((a, b) => a - b);

            // 格式化為：不補零、以 " . " 間隔，尾端加上 "號"
            const headStr = sortedHead.join(' . ') + ' 號';
            const tailStr = sortedTail.join(' . ') + ' 號';

            document.getElementById('headText').innerText = headStr;
            document.getElementById('tailText').innerText = tailStr;

            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // 抓取 API 並渲染表格數據
        async function fetchData() {
            const statusDiv = document.getElementById('status');
            const tableBody = document.getElementById('tableBody');
            
            // 將當前彩種代碼 (10059 或 10057) 帶入 API 參數
            const apiUrl = `/api/get-lottery?lotCode=${currentLotCode}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.result && data.result.data) {
                    globalFullData = data.result.data;
                    const displayData = globalFullData.slice(0, 30);

                    statusDiv.innerHTML = '<span style="color: #68d391;">✅ 即時同步中 (點擊冠~十查看順反)</span>';
                    tableBody.innerHTML = "";

                    displayData.forEach((item, index) => {
                        const pastRecords = globalFullData.slice(index + 1);
                        const nums = item.number.replace(/\s+/g, '').split(',');

                        const numBoxesHtml = nums.map((n, posIndex) => {
                            const val = parseInt(n, 10);
                            let colorClass = 'blue';

                            if (pastRecords.length > 0) {
                                const { headList, tailList } = getHeadTailForPosition(pastRecords, posIndex);
                                const headSet = new Set(headList);
                                const tailSet = new Set(tailList);

                                if (headSet.has(val)) {
                                    colorClass = 'green';
                                } else if (tailSet.has(val)) {
                                    colorClass = 'red';
                                }
                            }

                            // 畫面上的號碼方塊維持雙位數 (01, 02...) 格式呈現
                            const displayNum = val < 10 ? `0${val}` : `${val}`;
                            return `<div class="num-box ${colorClass}">${displayNum}</div>`;
                        }).join('');

                        const shortPeriod = item.period.length > 7 ? item.period.slice(-6) : item.period;

                        const row = `
                            <tr class="lottery-row">
                                <td class="period-cell" title="${item.period}">${shortPeriod}</td>
                                <td>
                                    <div class="numbers-cell">
                                        ${numBoxesHtml}
                                    </div>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '<span style="color: #fc8181;">⚠️ 請確認 Python 後端是否啟動中！</span>';
            }
        }

        // 開頁面立即載入一次
        fetchData();

        // 每 5 秒自動重新整理
        setInterval(fetchData, 5000);
    </script>

</body>
</html>
